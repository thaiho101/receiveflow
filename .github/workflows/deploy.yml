name: Deploy ReceiveFlow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - ARM

    steps:
      - name: Deploy application
        run: |
          cd /home/pi/personalDev/receiveflow/scripts
          chmod +x deploy.sh
          ./deploy.sh

      - name: Notify Telegram success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚀 ReceiveFlow deployed successfully. ✅%0A%0A🌿 Branch: main%0A📝 Title: ${{ github.event.head_commit.message }}%0A%0A🔑 Commit: ${{ github.sha }}%0A👤 By: ${{ github.actor }}%0A🔢 Run: ${{ github.run_number }}%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify Telegram failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ ReceiveFlow deployment failed.%0A%0A🌿 Branch: main%0A📝 Title: ${{ github.event.head_commit.message }}%0A%0A🔑 Commit: ${{ github.sha }}%0A👤 By: ${{ github.actor }}%0A🔢 Run: ${{ github.run_number }}%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

